<!doctype html>
<html lang="en" class="dark bg-[#070707]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <meta name="description" content="Analytics dashboard" />
    <link rel="icon" href="/public/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['Geist Mono', 'ui-monospace', 'monospace'],
            },
          },
        },
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="assets/main.js"></script>
  </head>
  <body class="bg-[#070707] font-sans antialiased text-neutral-200">
    <div id="page" data-breadcrumb="">
      <!-- Stat cards -->
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
        <!-- Accounts -->
        <div class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5">
          <div class="flex items-start justify-between">
            <span class="text-xs font-semibold uppercase tracking-widest text-neutral-500">Accounts</span>
            <span class="flex size-9 items-center justify-center rounded-xl bg-white/[0.04] text-neutral-500">
              <i data-lucide="cookie" class="size-4"></i>
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <span class="text-4xl font-bold leading-none text-neutral-50">9</span>
          </div>
          <div class="mt-5 flex h-12 items-end gap-1.5" data-bars></div>
        </div>
        <!-- Visits -->
        <div class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5">
          <div class="flex items-start justify-between">
            <span class="text-xs font-semibold uppercase tracking-widest text-neutral-500">Visits</span>
            <span class="flex size-9 items-center justify-center rounded-xl bg-white/[0.04] text-neutral-500">
              <i data-lucide="cookie" class="size-4"></i>
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <span class="text-4xl font-bold leading-none text-neutral-50">79</span>
          </div>
          <div class="mt-5 flex h-12 items-end gap-1.5" data-bars></div>
        </div>
        <!-- Robux -->
        <div class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5">
          <div class="flex items-start justify-between">
            <span class="text-xs font-semibold uppercase tracking-widest text-neutral-500">Robux</span>
            <span class="flex size-9 items-center justify-center rounded-xl bg-white/[0.04] text-neutral-500">
              <i data-lucide="cookie" class="size-4"></i>
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <span data-robux class="text-neutral-100"></span>
            <span class="text-4xl font-bold leading-none text-neutral-50">0</span>
          </div>
          <div class="mt-5 flex h-12 items-end gap-1.5" data-bars></div>
        </div>
        <!-- RAP -->
        <div class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5">
          <div class="flex items-start justify-between">
            <span class="text-xs font-semibold uppercase tracking-widest text-neutral-500">RAP</span>
            <span class="flex size-9 items-center justify-center rounded-xl bg-white/[0.04] text-neutral-500">
              <i data-lucide="cookie" class="size-4"></i>
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <span data-robux class="text-neutral-100"></span>
            <span class="text-4xl font-bold leading-none text-neutral-50">0</span>
          </div>
          <div class="mt-5 flex h-12 items-end gap-1.5" data-bars></div>
        </div>
        <!-- Summary -->
        <div class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5">
          <div class="flex items-start justify-between">
            <span class="text-xs font-semibold uppercase tracking-widest text-neutral-500">Summary</span>
            <span class="flex size-9 items-center justify-center rounded-xl bg-white/[0.04] text-neutral-500">
              <i data-lucide="cookie" class="size-4"></i>
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <span data-robux class="text-neutral-100"></span>
            <span class="text-4xl font-bold leading-none text-neutral-50">0</span>
          </div>
          <div class="mt-5 flex h-12 items-end gap-1.5" data-bars></div>
        </div>
      </div>

      <!-- Chart + Leaderboard -->
      <div class="mt-4 grid grid-cols-1 gap-4 lg:grid-cols-3">
        <div class="lg:col-span-2">
          <section class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5 sm:p-6">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
              <h2 class="flex items-center gap-2 text-base font-semibold text-neutral-100">
                <i data-lucide="activity" class="size-4 text-neutral-400"></i>
                Weekly Chart
              </h2>
              <div class="flex items-center gap-1 rounded-full border border-white/[0.06] bg-white/[0.03] p-1">
                <button type="button" data-chart-tab class="rounded-full px-3 py-1 text-xs font-medium transition-colors bg-white/[0.08] text-neutral-100">Summary</button>
                <button type="button" data-chart-tab class="rounded-full px-3 py-1 text-xs font-medium transition-colors text-neutral-500 hover:text-neutral-300">RAP</button>
                <button type="button" data-chart-tab class="rounded-full px-3 py-1 text-xs font-medium transition-colors text-neutral-500 hover:text-neutral-300">Robux</button>
              </div>
            </div>
            <div class="mt-6 flex gap-3">
              <div class="flex w-4 flex-col justify-between py-1 text-[11px] text-neutral-600">
                <span class="leading-none">4</span>
                <span class="leading-none">3</span>
                <span class="leading-none">2</span>
                <span class="leading-none">1</span>
                <span class="leading-none">0</span>
              </div>
              <div class="relative h-64 flex-1">
                <svg class="h-full w-full" viewBox="0 0 700 240" preserveAspectRatio="none" aria-hidden="true">
                  <line x1="0" x2="700" y1="4" y2="4" stroke="currentColor" class="text-white/[0.04]" stroke-width="1" />
                  <line x1="0" x2="700" y1="62" y2="62" stroke="currentColor" class="text-white/[0.04]" stroke-width="1" />
                  <line x1="0" x2="700" y1="120" y2="120" stroke="currentColor" class="text-white/[0.04]" stroke-width="1" />
                  <line x1="0" x2="700" y1="178" y2="178" stroke="currentColor" class="text-white/[0.04]" stroke-width="1" />
                  <line x1="0" x2="700" y1="236" y2="236" stroke="currentColor" class="text-white/[0.04]" stroke-width="1" />
                  <line x1="4" x2="696" y1="236" y2="236" stroke="currentColor" class="text-neutral-200" stroke-width="2.5" stroke-linecap="round" />
                </svg>
              </div>
            </div>
            <div class="ml-7 mt-3 flex justify-between text-[11px] text-neutral-600">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
          </section>
        </div>
        <div class="lg:col-span-1">
          <section class="relative flex h-full flex-col overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5 sm:p-6">
            <h2 class="flex items-center gap-2 text-base font-semibold text-neutral-100">
              <i data-lucide="crown" class="size-4 text-neutral-400"></i>
              Leaderboard
            </h2>
            <div class="flex flex-1 items-center justify-center py-16">
              <p class="text-sm text-neutral-600">No users yet</p>
            </div>
          </section>
        </div>
      </div>

      <!-- Live hits -->
      <div class="mt-4">
        <section class="relative overflow-hidden rounded-2xl border border-white/[0.06] bg-white/[0.02] p-5 sm:p-6">
          <div class="flex items-center justify-between">
            <h2 class="flex items-center gap-2 text-base font-semibold text-neutral-100">
              <i data-lucide="zap" class="size-4 text-neutral-400"></i>
              Live Hits
            </h2>
            <span class="flex items-center gap-2 text-xs font-semibold uppercase tracking-widest text-neutral-400">
              <span class="relative flex size-2">
                <span class="absolute inline-flex size-full animate-ping rounded-full bg-neutral-300 opacity-60"></span>
                <span class="relative inline-flex size-2 rounded-full bg-neutral-200"></span>
              </span>
              Live
            </span>
          </div>
          <div class="flex items-center justify-center py-20">
            <p class="text-sm text-neutral-600">No live hits yet</p>
          </div>
        </section>
      </div>
    </div>

    <script>
      // Render mini bar charts and robux glyphs before the shell is built.
      (function () {
        var pattern = [22, 30, 26, 46, 34, 30, 52, 44, 70, 58, 48]
        document.querySelectorAll("[data-bars]").forEach(function (el) {
          el.innerHTML = pattern
            .map(function (h) {
              return '<div class="flex-1 rounded-sm bg-neutral-600/70" style="height:' + h + '%"></div>'
            })
            .join("")
        })
        var robux =
          '<svg viewBox="0 0 24 24" fill="none" class="size-6" aria-hidden="true">' +
          '<path d="M12 2.5 20.5 7v10L12 21.5 3.5 17V7L12 2.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />' +
          '<circle cx="12" cy="12" r="3.4" stroke="currentColor" stroke-width="1.6" /></svg>'
        document.querySelectorAll("[data-robux]").forEach(function (el) {
          el.innerHTML = robux
        })
      })()
    </script>
  </body>
</html>
